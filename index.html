<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.6.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    
    <title>Linux Setup Generator</title>
</head>
<body>

    <div class="custom-control custom-switch">
        <input type="checkbox" class="custom-control-input" id="mySwitchv" value="vscode">
        <label class="custom-control-label" for="mySwitch">VS Code</label>
    </div>

    <div class="custom-control custom-switch">
        <input type="checkbox" class="custom-control-input" id="mySwitchg" value="google">
        <label class="custom-control-label" for="mySwitch">Google</label>
    </div>

    <div class="custom-control custom-switch">
        <input type="checkbox" class="custom-control-input" id="mySwitchs" value="spotify">
        <label class="custom-control-label" for="mySwitch">Spotify</label>
    </div>

    <button type="button" onclick="generate()">GENERATE SCRIPT</button>


</body>
<script src="script.js"></script>
</html>
